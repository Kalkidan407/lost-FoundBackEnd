
spring.datasource.url=jdbc:postgresql://ep-delicate-cloud-agxdn5ua-pooler.c-2.eu-central-1.aws.neon.tech/neondb?sslmode=require&channelBinding=require

spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.open-in-view=false

# Springdoc OpenAPI configuration for Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.show-actuator=false
springdoc.packages-to-scan=com.lostfound.lostfound.controller
springdoc.model-converters.enabled=true
springdoc.swagger-ui.deepLinking=true
springdoc.swagger-ui.syntaxHighlight.activate=true
springdoc.swagger-ui.layout=BaseLayout
springdoc.swagger-ui.use-root-path=true

# Connection pool settings for stability
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# Server timeout for long-running operations
server.tomcat.connection-timeout=60000

#cache

spring.cache.type=redis
